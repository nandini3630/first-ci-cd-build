services:

  postgres:
    image: postgres:15.7-bookworm
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - db_password
    networks:
      - python-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
          pids: 100
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d appdb"]
      interval: 10s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7.4.2-bookworm
    container_name: redis
    restart: unless-stopped
    networks:
      - python-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
          pids: 50

  python-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        APP_VERSION: ${APP_VERSION:-0.0.0.0}
    container_name: python-app
    init: true
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    networks:
      - python-network
    security_opt:
      - no-new-privileges=true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - 5000:5000
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
          pids: 100

volumes:
  postgres_data:

networks:
  python-network:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password
